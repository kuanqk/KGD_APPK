{% extends "base.html" %}

{% block title %}Вход — АППК{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-check text-primary" style="font-size: 3rem;"></i>
                    <h4 class="mt-2 fw-bold">АППК</h4>
                    <p class="text-muted small">Автоматизация административных дел КГД</p>
                </div>

                {% if form.errors %}
                <div class="alert alert-danger">
                    Неверный логин или пароль.
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Логин</label>
                        <input type="text" name="username" class="form-control" autofocus required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Пароль</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <input type="hidden" name="next" value="{{ next }}">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Войти
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
