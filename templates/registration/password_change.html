{% extends "base.html" %}

{% block title %}Смена пароля — АППК{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-header"><h5 class="mb-0">Смена пароля</h5></div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">{{ field.label }}</label>
                        <input type="password" name="{{ field.html_name }}"
                               class="form-control {% if field.errors %}is-invalid{% endif %}">
                        {% for error in field.errors %}
                        <div class="invalid-feedback">{{ error }}</div>
                        {% endfor %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a href="{% url 'accounts:dashboard' %}" class="btn btn-secondary ms-2">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
