<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: DejaVu;
            src: url('/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf');
        }
        @page {
            size: A4;
            margin: 2cm 2.5cm 2cm 3cm;
        }
        body {
            font-family: DejaVu, serif;
            font-size: 12pt;
            line-height: 1.2;
            color: #000;
        }
        .body-content {
            text-align: justify;
        }
        .body-content p {
            text-indent: 1.25cm;
            margin: 6px 0;
        }
    </style>
</head>
<body>
    <div class="body-content">
        {{ body }}
    </div>
</body>
</html>
