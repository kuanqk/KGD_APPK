{% extends "base.html" %}

{% block title %}Отчёты — АППК{% endblock %}

{% block content %}
<div class="mb-4">
    <h4 class="mb-0"><i class="bi bi-bar-chart-line"></i> Отчёты и аналитика</h4>
    <p class="text-muted small mt-1">Выберите отчёт для просмотра и экспорта.</p>
</div>

<div class="row g-3">
    {% for report_type, icon, title, description in reports %}
    <div class="col-md-4">
        <a href="{% url 'reports:detail' report_type=report_type %}"
           class="card h-100 text-decoration-none text-dark border-0 shadow-sm">
            <div class="card-body d-flex gap-3 align-items-start">
                <div class="flex-shrink-0 rounded-3 p-2 bg-primary bg-opacity-10">
                    <i class="bi {{ icon }} fs-4 text-primary"></i>
                </div>
                <div>
                    <div class="fw-semibold">{{ title }}</div>
                    <div class="text-muted small">{{ description }}</div>
                </div>
            </div>
        </a>
    </div>
    {% endfor %}
</div>
{% endblock %}
